name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.209.156.174
          username: staff1
          key: ${{ secrets.PROD_SSH_KEY }}
          command_timeout: 30m
          # Env vars are exported in the SSH shell BEFORE deploy-prod.sh runs
          # so the Next.js production build sees them at `next build` time
          # (and so does prisma generate + the runtime container). The
          # validator in lib/env.ts will refuse to start the app if any of
          # these are missing or look like placeholders. Mirrors the export
          # block in staging-deploy.yml so the two environments stay aligned.
          script: |
            # Locate the project directory dynamically (handles any path the
            # server admin chose) then hard-reset to the latest main commit.
            PROJECT_DIR=$(find /home /opt /srv -maxdepth 5 -name docker-compose.yml 2>/dev/null | grep -v node_modules | head -1 | xargs -I{} dirname {})
            echo "Project dir: $PROJECT_DIR"
            cd "$PROJECT_DIR"
            git fetch origin
            git checkout main 2>/dev/null || git checkout -b main origin/main
            git reset --hard origin/main
            echo "Now at: $(git log --oneline -1)"

            # Remove stale containers and image to force a full rebuild.
            docker rm -f ebright-osc-osc-1 ebright-osc-worker-1 2>/dev/null || true
            docker rmi ebright-osc:latest 2>/dev/null || true

            export NEXTAUTH_SECRET='${{ secrets.NEXTAUTH_SECRET }}'
            export BETTER_AUTH_SECRET='${{ secrets.BETTER_AUTH_SECRET }}'
            export ENCRYPTION_KEY='${{ secrets.ENCRYPTION_KEY }}'
            export DATABASE_URL='${{ secrets.DATABASE_URL }}'
            export CRM_PREVIEW_MODE='${{ secrets.CRM_PREVIEW_MODE }}'
            export SHARED_SSO_SECRET='${{ secrets.SHARED_SSO_SECRET }}'
            export INVENTORY_URL='${{ secrets.INVENTORY_URL }}'

            # Write env file so the running containers can read it at runtime.
            cat > .env <<ENVEOF
            NEXTAUTH_SECRET=$NEXTAUTH_SECRET
            BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
            ENCRYPTION_KEY=$ENCRYPTION_KEY
            DATABASE_URL=$DATABASE_URL
            CRM_PREVIEW_MODE=$CRM_PREVIEW_MODE
            SHARED_SSO_SECRET=$SHARED_SSO_SECRET
            INVENTORY_URL=$INVENTORY_URL
            ENVEOF

            docker compose up -d --build

            # Self-healing burnlist tables: idempotent DDL run inside the
            # worker container. Creates burnlist_week / burnlist_entry in
            # both `crm` and `public` schemas of whichever DATABASE_URL
            # the prod env points at. No-op on subsequent deploys.
            echo "===== ensuring burnlist tables exist ====="
            docker exec ebright-osc-worker-1 node scripts/ensure-burnlist-tables.mjs \
              || echo "WARN: burnlist tables ensure failed (non-fatal — page may show DB error until failed)"
